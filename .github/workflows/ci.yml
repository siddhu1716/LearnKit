# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling build

      - name: Install project in editable mode with dev dependencies
        run: |
          pip install -e .[dev]

      - name: Run lint (ruff)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check .

      - name: Run type checking (mypy)
        continue-on-error: true
        run: |
          pip install mypy
          mypy learnkit

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q

      - name: Build package (wheel)
        run: |
          python -m build

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Expose the secret as a job-level env var so the upload step can
    # gate on its presence. Secrets cannot be referenced in job-level `if`.
    env:
      TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution files
        run: |
          python -m build --sdist --wheel

      - name: Publish to Test PyPI (optional)
        # Skipped until TEST_PYPI_TOKEN is configured in repo secrets.
        # When the secret is added, this step runs automatically.
        if: env.TEST_PYPI_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.TEST_PYPI_TOKEN }}
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*
